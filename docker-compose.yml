version: "3.9"
# ═══════════════════════════════════════════════════════════
# BTC Quantitative Trading Platform — Full Stack
# ═══════════════════════════════════════════════════════════
#
# Services:
#   postgres       — Trade ledger + anchor records
#   redis          — UTXO locks + idempotency + OHLCV cache
#   clickhouse     — Historical OHLCV time-series (optional)
#   bitcoin-node   — BTC Regtest/Testnet node
#   audit-layer    — Python: Merkle Engine + OP_RETURN anchor
#   quant-engine   — Python: 8 quant models + backtesting
#   market-data    — Node.js: WebSocket OHLCV push + DataFeed
#   matching-engine— Node.js: Order Book + UTXO locking
#   frontend       — React/Vite: TradingView charts + order panel

services:
  # ── Infrastructure ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_db
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./audit-layer/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit_db"]
      interval: 5s; timeout: 5s; retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s; timeout: 3s; retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports: ["8123:8123", "9000:9000"]
    environment:
      CLICKHOUSE_DB: market_data
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes: ["chdata:/var/lib/clickhouse"]
    profiles: ["full"]  # Optional — use --profile full

  bitcoin-node:
    image: ruimarinho/bitcoin-core:28
    command:
      -printtoconsole
      -regtest=1
      -rpcuser=admin
      -rpcpassword=admin
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -txindex=1
      -fallbackfee=0.00001
    ports: ["18443:18443", "18444:18444"]
    volumes: ["btcdata:/home/bitcoin/.bitcoin"]
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -regtest -rpcuser=admin -rpcpassword=admin getblockchaininfo"]
      interval: 10s; timeout: 10s; retries: 10

  # ── Application Services ──────────────────────────────
  audit-layer:
    build:
      context: ./audit-layer
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      AUDIT_DATABASE_URL: "postgresql+asyncpg://audit:audit@postgres:5432/audit_db"
      AUDIT_BTC_NETWORK: regtest
      AUDIT_BTC_RPC_URL: "http://bitcoin-node:18443"
      AUDIT_BTC_RPC_USER: admin
      AUDIT_BTC_RPC_PASSWORD: admin
      AUDIT_REDIS_URL: "redis://redis:6379/1"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      bitcoin-node: { condition: service_healthy }

  quant-engine:
    build:
      context: ./quant-engine
      dockerfile: Dockerfile
    ports: ["8001:8001"]
    environment:
      QUANT_REDIS_URL: "redis://redis:6379/0"
      QUANT_CIRCUIT_BREAKER_MAX_VOLATILITY: "0.05"
      QUANT_KELLY_DEFAULT_CRITERION: HALF
    depends_on:
      redis: { condition: service_healthy }

  market-data:
    build:
      context: ./market-data
      dockerfile: Dockerfile
    ports: ["8080:8080", "8081:8081"]
    environment:
      MD_WS_PORT: "8080"
      MD_REDIS_URL: "redis://redis:6379/0"
      MD_CLICKHOUSE_URL: "http://clickhouse:8123"
    depends_on:
      redis: { condition: service_healthy }

  matching-engine:
    build:
      context: ./matching-engine
      dockerfile: Dockerfile
    ports: ["8002:8002"]
    environment:
      ME_REDIS_URL: "redis://redis:6379/2"
    depends_on:
      redis: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:80"]
    environment:
      VITE_WS_URL: "ws://localhost:8080"
      VITE_API_URL: "http://localhost:8001"
    depends_on:
      - market-data
      - quant-engine

volumes:
  pgdata:
  redisdata:
  chdata:
  btcdata:
