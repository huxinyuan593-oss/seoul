# BTC Testnet3 Override — Real on-chain anchoring
# Usage: docker compose -f docker-compose.yml -f docker-compose.testnet.yml up
version: "3.9"

services:
  bitcoin-node:
    command:
      -printtoconsole
      -testnet=1
      -rpcuser=admin
      -rpcpassword=admin
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -txindex=1
    ports: ["18332:18332", "18333:18333"]
    # Testnet3 uses 18332 (RPC) and 18333 (P2P)

  audit-layer:
    env_file:
      - ./audit-layer/.env.testnet
